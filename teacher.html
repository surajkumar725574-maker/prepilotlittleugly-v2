<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EngineerHub - Teacher Section</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <nav class="navbar">
    <div class="logo">PrePilot</div>

    <div class="nav-links">
      <a href="./index.html">Home</a>
      <a href="./assistant.html">AI Assistant</a>
      <a href="./generator.html">Study Generator</a>
      <a href="./teacher.html">Teacher Section</a>
    </div>
  </nav>

  <section class="teacher-section">
    <h1>Teacher Section</h1>
    <p class="teacher-subtitle">
      Upload notes, create assignments, and manage study material for students.
    </p>

    <div class="teacher-grid">

      <div class="teacher-card">
        <h2>Upload Notes</h2>
        <input type="file" id="notesFile">
        <button onclick="uploadNotes()">Upload Notes</button>
        <p id="notesMessage" class="success-message"></p>

        <ul id="notesList" class="teacher-list"></ul>
      </div>

      <div class="teacher-card">
        <h2>Create Assignment</h2>
        <input type="text" id="assignmentTitle" placeholder="Assignment title">
        <textarea id="assignmentDetails" placeholder="Assignment details"></textarea>
        <button onclick="createAssignment()">Create Assignment</button>

        <ul id="assignmentList" class="teacher-list"></ul>
      </div>

      <div class="teacher-card">
        <h2>Study Material</h2>
        <input type="text" id="materialTitle" placeholder="Material title">
        <input type="text" id="materialLink" placeholder="Material link or topic">
        <button onclick="addStudyMaterial()">Add Material</button>

        <ul id="materialList" class="teacher-list"></ul>
      </div>

    </div>
  </section>

  <script src="./project-1.js"></script>
</body>
</html>
